name: build

on:
  push:
    branches:
      - '**'
      - '!main'
    paths:
      - '**'
      - '!.github/workflows/*'
      - '!.gitignore'
      - '!LICENSE'
      - '!README.md'
      - '.github/workflows/release.yml'

jobs:
  build:
    uses: opengood-ai/central-workflows/.github/workflows/python-package-build.yml@main
    with:
      run-code-coverage: true
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
